<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="./carrot.css" />
    <title>carrot</title>
  </head>
  <body>
    <header>
      <div class="header-main">
        <a class="header-logo" href="">
          <img
            src="./img/carrot_logo.png"
            width="80"
            height="48"
            alt="carrot logo"
          />
        </a>
        <div class="header-menu">
          <ul class="header-menu-list">
            <li class="header-menu-item">
              <a href="" class="link_service">
                <span class="header-menu-link">중고거래</span>
              </a>
            </li>
            <li class="header-menu-item">
              <a href="" class="link_service">
                <span class="header-menu-link">동네업체</span>
              </a>
            </li>
            <li class="header-menu-item">
              <a href="" class="link_service">
                <span class="header-menu-link">알바</span>
              </a>
            </li>
            <li class="header-menu-item">
              <a href="" class="link_service">
                <span class="header-menu-link">부동산 직거래</span>
              </a>
            </li>
            <li class="header-menu-item">
              <a href="" class="link_service">
                <span class="header-menu-link">중고차 직거래</span>
              </a>
            </li>
          </ul>
        </div>
        <div class="header-service">
          <div class="header-search">
            <form action="" method="GET">
              <input
                type="text"
                id="search"
                name="search"
                placeholder="물품이나 동네를 검색해 보세요"
              />
            </form>
          </div>
          <a href="" class="header-chat-button"> 채팅하기 </a>
        </div>
      </div>
    </header>
    <main>
      <section class="main-first">
        <div class="main-first-description">
          <h1 class="main-first-title">
            당신 근처의 <br />
            지역 생활 커뮤니티
          </h1>
          <p class="main-first-text">
            동네라서 가능한 모든 것<br />
            당근에서 가까운 이웃과 함께해요.
          </p>
          <div class="main-first-downloads">
            <a class="main-first-button" href="">
              <img
                src="./img/playstore-logo.svg"
                width="30"
                height="30"
                alt="playstore logo"
              />
              <div class="main-first-down-store"><p>Google Play</p></div>
            </a>
            <a class="main-first-button" href="">
              <img
                src="./img/appstore-logo.svg"
                width="30"
                height="30"
                alt="app store logo"
              />
              <div class="main-first-down-store"><p>App Store</p></div>
            </a>
          </div>
        </div>

        <div class="main-first-character">
          <img
            src="./img/main-first-character.webp"
            width="500"
            height="650"
            alt="carrot character"
          />
        </div>
      </section>
    </main>
    <footer></footer>
    <script src="./carrot.js"></script>
  </body>
</html>
